<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Products — ShopZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
      .page-hero {
        background: linear-gradient(135deg, var(--accent-soft), #f3e8ff);
        padding: 3rem 2rem;
        text-align: center;
        border-bottom: 1px solid var(--border);
      }
      .page-hero h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; margin-bottom: 0.5rem; }
      .page-hero p { color: var(--muted); font-size: 1rem; }

      .search-bar-wrap {
        max-width: 500px;
        margin: 1.5rem auto 0;
        position: relative;
      }
      .search-bar-wrap input {
        width: 100%;
        padding: 0.75rem 1rem 0.75rem 2.8rem;
        border: 1.5px solid var(--border);
        border-radius: 50px;
        font-size: 0.9rem;
        font-family: inherit;
        outline: none;
        transition: border-color var(--transition);
        background: var(--white);
      }
      .search-bar-wrap input:focus { border-color: var(--accent); }
      .search-bar-wrap .search-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1rem;
        pointer-events: none;
      }

      .products-page { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; }

      .price-range-wrap {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        font-size: 0.85rem;
        color: var(--muted);
        font-weight: 600;
      }
      .price-range-wrap input[type="range"] {
        accent-color: var(--accent);
        cursor: pointer;
      }
      #price-label { color: var(--accent); font-weight: 700; }

      .controls-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
    </style>
  </head>
  <body>

    <header id="navbar">
      <nav class="nav-container">
        <a href="index.html" class="nav-logo">🛍️ ShopZone</a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html" style="color:var(--accent)">Products</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
        <a href="checkout.html" class="cart-toggle">🛒 Checkout</a>
      </nav>
    </header>

    <div class="page-hero">
      <h1>All <span class="gradient-text">Products</span></h1>
      <p>Browse our full collection of premium items</p>
      <div class="search-bar-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search products..." />
      </div>
    </div>

    <main class="products-page">
      <div class="controls-row">
        <div class="filter-group" id="filter-group">
          <button class="filter-btn active" data-cat="all">All</button>
          <button class="filter-btn" data-cat="Electronics">Electronics</button>
          <button class="filter-btn" data-cat="Clothing">Clothing</button>
          <button class="filter-btn" data-cat="Shoes">Shoes</button>
          <button class="filter-btn" data-cat="Accessories">Accessories</button>
        </div>
        <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap;">
          <div class="price-range-wrap">
            <span>Max Price:</span>
            <input type="range" id="price-range" min="10" max="400" value="400" step="10" />
            <span id="price-label">$400</span>
          </div>
          <select id="sort-select" aria-label="Sort products">
            <option value="default">Sort: Default</option>
            <option value="price-asc">Price: Low → High</option>
            <option value="price-desc">Price: High → Low</option>
            <option value="rating-desc">Top Rated</option>
          </select>
        </div>
      </div>

      <p class="result-count" id="result-count"></p>
      <div class="product-grid" id="product-grid"></div>
      <div class="no-results" id="no-results">
        <span>🔍</span>
        <p>No products found.</p>
      </div>
    </main>

    <footer>
      <div class="footer-inner">
        <a href="index.html" class="nav-logo">🛍️ ShopZone</a>
        <div style="display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;">
          <a href="index.html" style="color:var(--muted);font-size:0.82rem;font-weight:600;text-decoration:none;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">Home</a>
          <a href="products.html" style="color:var(--muted);font-size:0.82rem;font-weight:600;text-decoration:none;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">Products</a>
          <a href="about.html" style="color:var(--muted);font-size:0.82rem;font-weight:600;text-decoration:none;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">About</a>
          <a href="contact.html" style="color:var(--muted);font-size:0.82rem;font-weight:600;text-decoration:none;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">Contact</a>
          <a href="checkout.html" style="color:var(--muted);font-size:0.82rem;font-weight:600;text-decoration:none;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">Checkout</a>
        </div>
        <p>© 2026 ShopZone · Built by Deep Baidya</p>
        <a href="#" class="back-top">↑ Top</a>
      </div>
    </footer>

    <div class="toast" id="toast"></div>

    <script>
      const products = [
        { id: 1, name: "Wireless Noise-Cancelling Headphones", category: "Electronics", price: 89.99, rating: 4.7, image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=200&fit=crop" },
        { id: 2, name: "Slim Fit Cotton T-Shirt", category: "Clothing", price: 24.99, rating: 4.3, image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400&h=200&fit=crop" },
        { id: 3, name: "Running Sneakers Pro", category: "Shoes", price: 119.99, rating: 4.8, image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&h=200&fit=crop" },
        { id: 4, name: "Leather Minimalist Wallet", category: "Accessories", price: 34.99, rating: 4.5, image: "https://images.unsplash.com/photo-1627123424574-724758594e93?w=400&h=200&fit=crop" },
        { id: 5, name: "4K Ultra HD Smart TV 43\"", category: "Electronics", price: 349.99, rating: 4.6, image: "https://images.unsplash.com/photo-1593359677879-a4bb92f829e1?w=400&h=200&fit=crop" },
        { id: 6, name: "Classic Denim Jacket", category: "Clothing", price: 64.99, rating: 4.2, image: "https://images.unsplash.com/photo-1551537482-f2075a1d41f2?w=400&h=200&fit=crop" },
        { id: 7, name: "Casual Canvas Loafers", category: "Shoes", price: 49.99, rating: 4.1, image: "https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=400&h=200&fit=crop" },
        { id: 8, name: "Stainless Steel Watch", category: "Accessories", price: 149.99, rating: 4.9, image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=200&fit=crop" },
        { id: 9, name: "Bluetooth Mechanical Keyboard", category: "Electronics", price: 79.99, rating: 4.4, image: "https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400&h=200&fit=crop" },
        { id: 10, name: "Floral Summer Dress", category: "Clothing", price: 39.99, rating: 4.6, image: "https://images.unsplash.com/photo-1572804013309-59a88b7e92f1?w=400&h=200&fit=crop" },
        { id: 11, name: "Portable Bluetooth Speaker", category: "Electronics", price: 59.99, rating: 4.5, image: "https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=400&h=200&fit=crop" },
        { id: 12, name: "Leather Ankle Boots", category: "Shoes", price: 89.99, rating: 4.3, image: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=400&h=200&fit=crop" },
        { id: 13, name: "Polarized Sunglasses", category: "Accessories", price: 44.99, rating: 4.4, image: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400&h=200&fit=crop" },
        { id: 14, name: "Hooded Zip-Up Sweatshirt", category: "Clothing", price: 54.99, rating: 4.2, image: "https://images.unsplash.com/photo-1556821840-3a63f15732ce?w=400&h=200&fit=crop" },
        { id: 15, name: "Smart Fitness Tracker", category: "Electronics", price: 69.99, rating: 4.6, image: "https://images.unsplash.com/photo-1575311373937-040b8e1fd5b6?w=400&h=200&fit=crop" },
      ];

      let activeFilter = 'all', activeSort = 'default', searchQuery = '', maxPrice = 400;

      function getStars(r) { return '★'.repeat(Math.floor(r)) + (r%1>=0.5?'½':'') + '☆'.repeat(5-Math.floor(r)-(r%1>=0.5?1:0)); }
      function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
      }

      function render() {
        let list = products.filter(p =>
          (activeFilter === 'all' || p.category === activeFilter) &&
          p.price <= maxPrice &&
          p.name.toLowerCase().includes(searchQuery)
        );
        if (activeSort === 'price-asc') list.sort((a,b) => a.price - b.price);
        if (activeSort === 'price-desc') list.sort((a,b) => b.price - a.price);
        if (activeSort === 'rating-desc') list.sort((a,b) => b.rating - a.rating);

        document.getElementById('result-count').textContent = `Showing ${list.length} product${list.length!==1?'s':''}`;
        document.getElementById('no-results').style.display = list.length ? 'none' : 'flex';

        document.getElementById('product-grid').innerHTML = list.map((p, i) => `
          <div class="product-card" style="animation-delay:${i*0.04}s">
            <div class="product-img-wrap">
              <img src="${p.image}" alt="${p.name}" loading="lazy" width="400" height="200" />
              <span class="cat-chip">${p.category}</span>
            </div>
            <div class="product-body">
              <p class="product-name" title="${p.name}">${p.name}</p>
              <div class="product-meta">
                <span class="product-rating"><span class="stars">${getStars(p.rating)}</span> ${p.rating}</span>
                <span class="product-price">$${p.price.toFixed(2)}</span>
              </div>
              <div style="display:flex;gap:0.5rem;">
                <button class="add-to-cart-btn" onclick="addToCart(${p.id})" style="flex:1">Add to Cart</button>
                <a href="product-detail.html?id=${p.id}" class="btn-outline" style="padding:0.5rem 0.8rem;font-size:0.8rem;border-radius:8px;">View</a>
              </div>
            </div>
          </div>
        `).join('');
      }

      function addToCart(id) {
        const p = products.find(x => x.id === id);
        let cart = JSON.parse(localStorage.getItem('shopzone_cart') || '[]');
        const ex = cart.find(i => i.id === id);
        if (ex) ex.qty++; else cart.push({...p, qty: 1});
        localStorage.setItem('shopzone_cart', JSON.stringify(cart));
        showToast(`🛒 "${p.name}" added to cart!`);
      }

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = btn.dataset.cat;
          render();
        });
      });

      document.getElementById('sort-select').addEventListener('change', e => { activeSort = e.target.value; render(); });
      document.getElementById('search-input').addEventListener('input', e => { searchQuery = e.target.value.toLowerCase(); render(); });
      document.getElementById('price-range').addEventListener('input', e => {
        maxPrice = Number(e.target.value);
        document.getElementById('price-label').textContent = `$${maxPrice}`;
        render();
      });

      window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
      }, { passive: true });

      render();
    </script>
  </body>
</html>
